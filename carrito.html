<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito – Elara Life</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar">
    <h2 class="logo">Elara Life</h2>
    <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="coleccion.html">Colección</a></li>
        <li><a href="favoritos.html"><i class="bi bi-heart"></i></a></li>
        <li><a href="carrito.html"><i class="bi bi-cart"></i></a></li>
        <li><a href="perfil.html"><i class="bi bi-person"></i></a></li>
    </ul>
</nav>

<header class="header">
    <h1>Mi carrito</h1>
</header>

<div class="container">
    <section id="carrito-productos" class="productos"></section>
    <div id="total-carrito" style="margin-top:20px; font-weight:bold;"></div>
</div>

<footer style="background:#b894a6; padding:30px 0; color:white;"></footer>

<script>
// LIMPIA PRECIO
function limpiarPrecio(texto) {
    if (!texto) return 0;
    return parseFloat(
        texto
        .toString()
        .replace('$','')
        .replace('MXN','')
        .replace('mxn','')
        .replace(/,/g,'')
        .trim()
    ) || 0;
}

// MUESTRA CARRITO
function mostrarCarrito() {
    const contenedor = document.getElementById("carrito-productos");
    const totalCont = document.getElementById("total-carrito");

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    contenedor.innerHTML = "";
    let total = 0;

    carrito.forEach((p, index) => {
        if (!p.cantidad) p.cantidad = 1; // aseguramos cantidad

        const precioNumerico = limpiarPrecio(p.precio);
        total += precioNumerico * p.cantidad;

        const div = document.createElement("div");
        div.classList.add("item");

        div.innerHTML = `
            <img src="${p.imagen}">
            <h2>${p.nombre}</h2>
            <p class="precio">$${precioNumerico.toFixed(2)}</p>
            <p>Cantidad:
                <input type="number" min="1" value="${p.cantidad}" onchange="cambiarCantidad(${index}, this.value)">
            </p>
            <button onclick="eliminarProducto(${index})">Eliminar</button>
        `;

        contenedor.appendChild(div);
    });

    totalCont.textContent = "Total: $" + total.toFixed(2);
}

// CAMBIA CANTIDAD
function cambiarCantidad(index, cantidad) {
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    carrito[index].cantidad = parseInt(cantidad) || 1;
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrarCarrito();
}

// ELIMINAR PRODUCTO
function eliminarProducto(index) {
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    carrito.splice(index, 1);
    localStorage.setItem("carrito", JSON.stringify(carrito));
    mostrarCarrito();
}

window.onload = mostrarCarrito;
</script>

</body>
</html>
